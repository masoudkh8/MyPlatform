{% extends "base.html" %}

{% block title %}Login - B2B Traders Platform{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to continue to your account</p>
    
    <form method="POST" class="auth-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="input-group">
        <input type="email" name="email" class="input-field" placeholder="Email address" required>
      </div>
      
      <div class="input-group">
        <input type="password" name="password" class="input-field" placeholder="Password" required>
      </div>
      
      <button type="submit" class="btn btn-primary btn-block auth-submit">Sign In</button>
    </form>
    
    <div class="auth-divider">
      Don't have an account? 
      <a href="{{ url_for('main.register') }}" class="auth-link">Sign up</a>
    </div>
  </div>
</div>
{% endblock %}
